name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          # - os: ubuntu-latest
          #   platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Typecheck
        working-directory: app
        run: npm run typecheck

      - name: Build Electron app
        working-directory: app
        run: npm run build

      - name: Package & upload to GitHub Release (draft)
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} --publish always

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p \"require('./app/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Publish release (un-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # Find the draft release for this tag
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq ".[] | select(.tag_name == \"$TAG\" and .draft == true) | .id")

          if [ -n "$RELEASE_ID" ]; then
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID \
              --method PATCH \
              --field draft=false
            echo "Published release $TAG"
          else
            echo "No draft release found for $TAG — it may already be published"
          fi
