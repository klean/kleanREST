appId: com.kleangroup.kleanrest
productName: kleanREST
directories:
  buildResources: build
  output: dist
files:
  - "out/**/*"
  - "package.json"
publish:
  provider: github
  owner: klean
  repo: kleanREST
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.png
  category: public.app-category.developer-tools
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
